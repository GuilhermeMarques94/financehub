<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>FinanceHub</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Área de autenticação (injetada) -->
  <div id="auth-container"></div>

  <!-- App principal -->
  <div id="app" class="app" style="display:none">
    <!-- Topbar mobile -->
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
      <span class="brand">💰 FinanceHub</span>
      <button class="ghost" onclick="logout()">Sair</button>
    </header>

    <!-- Overlay mobile -->
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="brand-desktop">💰 FinanceHub</div>
      <nav>
        <button class="nav-item" data-sec="dashboard" onclick="navTo('dashboard')">📊 Dashboard</button>
        <button class="nav-item" data-sec="lancamentos" onclick="navTo('lancamentos')">📝 Lançamentos</button>
        <button class="nav-item" data-sec="contas" onclick="navTo('contas')">🏦 Contas</button>
        <button class="nav-item" data-sec="cartoes" onclick="navTo('cartoes')">💳 Cartões</button>
        <button class="nav-item" data-sec="categorias" onclick="navTo('categorias')">🗂️ Plano de Contas</button>
      </nav>
    </aside>

    <!-- Conteúdo dinâmico -->
    <main id="view" class="view"></main>
  </div>

  <!-- Modal genérico -->
  <div id="modal" class="modal-backdrop" style="display:none">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
