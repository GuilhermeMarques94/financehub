<div class="auth-box">
  <h1>💰 FinanceHub</h1>
  <p class="sub">Controle financeiro inteligente</p>
  <input id="nome" placeholder="Nome" style="display:none" />
  <input id="email" type="email" placeholder="E-mail" />
  <input id="senha" type="password" placeholder="Senha" />
  <button class="primary" onclick="login()">Entrar</button>
  <button class="link" onclick="toggleRegister()">Criar conta / Voltar</button>
  <p id="msg" class="error"></p>
</div>
